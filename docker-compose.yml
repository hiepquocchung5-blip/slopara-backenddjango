services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: slopara
      POSTGRES_USER: slopara_user
      # Wrapped in quotes to prevent YAML parsing errors with the '!' character
      POSTGRES_PASSWORD: "SloparaDjango1May@!"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always

  backend:
    build: .
    restart: always
    # Formatted onto a single line to prevent indentation mapping errors
    command: sh -c "python manage.py migrate && daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  postgres_data: